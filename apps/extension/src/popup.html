<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YTPresence</title>
    <style>
      body {
        width: 310px;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        color: #172033;
        background: #f8fafc;
      }
      main {
        display: grid;
        gap: 14px;
        padding: 16px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      h1,
      p {
        margin: 0;
      }
      h1 {
        font-size: 18px;
      }
      .status {
        border-radius: 999px;
        padding: 4px 8px;
        color: #ffffff;
        background: #64748b;
        font-size: 12px;
        font-weight: 700;
      }
      .status.connected {
        background: #15803d;
      }
      .panel {
        display: grid;
        gap: 8px;
        border: 1px solid #dce3eb;
        border-radius: 8px;
        padding: 12px;
        background: #ffffff;
      }
      .label {
        color: #697386;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .track {
        font-weight: 700;
      }
      .muted {
        color: #667085;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>YTPresence</h1>
        <span id="status" class="status">Waiting</span>
      </header>
      <section class="panel">
        <span class="label">Current track</span>
        <p id="track" class="track">No track detected</p>
        <p id="meta" class="muted">Open YouTube Music in this browser.</p>
      </section>
      <section class="panel">
        <span class="label">Last update</span>
        <p id="updated" class="muted">Never</p>
      </section>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
