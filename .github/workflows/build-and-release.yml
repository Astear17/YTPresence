name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"
      release_name:
        description: "Release title"
        required: true
        default: "YTPresence v0.1.0"
      draft:
        description: "Create as draft release"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build installer, extension, and release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build desktop installer and extension package
        run: pnpm package:release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YTPresence-Release-Assets
          path: |
            apps/desktop/release/YTPresence-Setup-*.exe
            apps/desktop/release/YTPresence-Setup-*.exe.blockmap
            apps/extension/release/YTPresence-Companion-Extension-*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            apps/desktop/release/YTPresence-Setup-*.exe
            apps/desktop/release/YTPresence-Setup-*.exe.blockmap
            apps/extension/release/YTPresence-Companion-Extension-*.zip
